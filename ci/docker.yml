variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

.docker-buildx:
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  before_script:
    - docker version
    - docker buildx version
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      if [ "$CI_PIPELINE_SOURCE" != "merge_request_event" ]; then
        docker run --privileged --rm tonistiigi/binfmt --install all
      fi
    - docker buildx create --name 3x-ui-builder --use
    - docker buildx inspect --bootstrap

docker:image:
  extends: .docker-buildx
  stage: docker
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - .dockerignore
        - DockerEntrypoint.sh
        - DockerInit.sh
        - docker-compose.yml
        - go.mod
        - go.sum
        - "**/*.go"
        - frontend/**/*
        - internal/web/translation/**/*
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - if: $CI_COMMIT_BRANCH
      changes:
        - Dockerfile
        - .dockerignore
        - DockerEntrypoint.sh
        - DockerInit.sh
        - docker-compose.yml
        - go.mod
        - go.sum
        - "**/*.go"
        - frontend/**/*
        - internal/web/translation/**/*
    - when: never
  script:
    - |
      set -eu

      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        docker buildx build \
          --pull \
          --platform linux/amd64 \
          --tag "$CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID" \
          .
        exit 0
      fi

      TAG_ARGS="--tag $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG --tag $CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        TAG_ARGS="--tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG --tag $CI_REGISTRY_IMAGE:$VERSION"
      fi

      docker buildx build \
        --pull \
        --push \
        --platform linux/amd64,linux/arm64/v8,linux/arm/v7,linux/arm/v6,linux/386 \
        $TAG_ARGS \
        .
