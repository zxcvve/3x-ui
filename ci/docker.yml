.kaniko-build:
  image:
    name: gcr.io/kaniko-project/executor:v1.24.0-debug
    entrypoint: [""]
  before_script:
    - |
      set -eu
      if [ -n "${CI_REGISTRY:-}" ] && [ -n "${CI_REGISTRY_USER:-}" ] && [ -n "${CI_REGISTRY_PASSWORD:-}" ]; then
        mkdir -p /kaniko/.docker
        AUTH="$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"
        printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$CI_REGISTRY" "$AUTH" > /kaniko/.docker/config.json
      fi

docker:image:
  extends: .kaniko-build
  stage: docker
  needs:
    - job: binary:amd64
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - .dockerignore
        - DockerEntrypoint.sh
        - docker-compose.yml
        - go.mod
        - go.sum
        - "**/*.go"
        - frontend/**/*
        - internal/web/translation/**/*
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - if: $CI_COMMIT_BRANCH
      changes:
        - Dockerfile
        - .dockerignore
        - DockerEntrypoint.sh
        - docker-compose.yml
        - go.mod
        - go.sum
        - "**/*.go"
        - frontend/**/*
        - internal/web/translation/**/*
    - when: never
  script:
    - |
      set -eu
      tar -xzf x-ui-linux-amd64.tar.gz

      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --no-push \
          --pull \
          --destination "$CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID"
        exit 0
      fi

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --pull \
          --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
          --destination "$CI_REGISTRY_IMAGE:$VERSION"
      else
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --pull \
          --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \
          --destination "$CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"
      fi
